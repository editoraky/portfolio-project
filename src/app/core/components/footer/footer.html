<footer class="footer">
  <div class="footer__container container">
    <div class="footer__left">
      <a routerLink="/" class="footer__logo" aria-label="Zur Startseite" (click)="scrollToTop()">
        <img src="assets/icon/ak-logo.png" alt="AK Logo" class="footer__logo-img" />
      </a>
      <a href="mailto:contact@akin-kuelhanbey.com" class="footer__email">
        contact@akin-kuelhanbey.com
      </a>
      <p class="footer__copyright">© Akin Kuelhanbey 2025</p>
    </div>
    <div class="footer__right">
      <div class="footer__social">
        <a
          href="https://github.com/editoraky"
          target="_blank"
          rel="noopener noreferrer"
          class="footer__social-link"
          aria-label="GitHub Profil"
        >
          <img src="assets/icon/github.svg" alt="" class="footer__social-icon" />
        </a>
        <a href="mailto:deine@email.de" class="footer__social-link" aria-label="E-Mail senden">
          <img src="assets/icon/email.svg" alt="" class="footer__social-icon" />
        </a>
        <a
          href="https://www.linkedin.com/in/akuelhanbey/"
          target="_blank"
          rel="noopener noreferrer"
          class="footer__social-link"
          aria-label="LinkedIn Profil"
        >
          <img src="assets/icon/linkedin.svg" alt="" class="footer__social-icon" />
        </a>
      </div>
      <a routerLink="/legal-notice" class="footer__legal-link">{{ texts().footer.legalNotice }}</a>
    </div>
  </div>
</footer>
