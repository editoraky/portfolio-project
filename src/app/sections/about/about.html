<section class="about" id="about">
  <div class="about__content">
    <h2 class="about__title" [class.green]="isTitleGreen">
      {{ texts().about.title }}
    </h2>

    <div class="about__text-wrapper">
      <div class="about__description">
        <p>{{ texts().about.description1 }}</p>
        <p>{{ texts().about.description2 }}</p>
      </div>
      <div class="about__info">
        <div class="about__info-item">
          <img src="assets/icon/house.svg" alt="" class="about__info-icon" />
          <span>{{ texts().about.location }}</span>
        </div>
        <div class="about__info-item">
          <img src="assets/icon/laptop_chromebook.svg" alt="" class="about__info-icon" />
          <span>{{ texts().about.remote }}</span>
        </div>
      </div>
      <a href="#contact" class="about__button">
        {{ texts().about.button }}
      </a>
    </div>
  </div>
  <div class="about__image-wrapper">
    <div class="about__image-container">
      <div class="about__image-frame" [class.visible]="isFrameVisible"></div>
      <img src="assets/images/ak-square-bw.jpeg" alt="Akin Külhanbey" class="about__image" />
    </div>
  </div>
  <a href="#skills" class="about__arrow" [class.animate]="isMobile && arrowAnimated" (click)="onArrowClick($event, '#skills')">
  @if (isMobile) {
    <img src="assets/icon/arrow-left.svg" alt="" class="about__arrow-mobile" />
  } @else {
    <img src="assets/icon/arrow-left1.svg" alt="" class="about__arrow-1" />
    <img src="assets/icon/arrow-left2.svg" alt="" class="about__arrow-2" />
    <img src="assets/icon/arrow-left3.svg" alt="" class="about__arrow-3" />
  }
</a>
</section>
