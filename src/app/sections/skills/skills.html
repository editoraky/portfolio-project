<section class="skills" id="skills">
  <div class="skills__container">
    <h2 class="skills__title" [class.green]="isTitleGreen">{{ texts().skills.title }}</h2>

    <div class="skills__grid">
      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/angular.svg" alt="Angular" />
        </div>
        <span>Angular</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/typescript.svg" alt="TypeScript" />
        </div>
        <span>TypeScript</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/javascript.svg" alt="JavaScript" />
        </div>
        <span>JavaScript</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/html.svg" alt="HTML" />
        </div>
        <span>HTML</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/css.svg" alt="CSS" />
        </div>
        <span>CSS</span>
      </div>
      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/firebase.svg" alt="Firebase" />
        </div>
        <span>Firebase</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/git.svg" alt="Git" />
        </div>
        <span>Git</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/scrum.svg" alt="Scrum" />
        </div>
        <span>Scrum</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/restapi.svg" alt="REST-API" />
        </div>
        <span>REST-API</span>
      </div>

      <div class="skills__item">
        <div class="skills__item-wrapper">
          <img src="assets/icon/material-design.svg" alt="Material Design" />
        </div>
        <span>Material Design</span>
      </div>
    </div>
    <div class="skills__cta">
      <div class="skills__cta-icon-wrapper">
        <img src="assets/icon/learning.svg" alt="" class="skills__cta-icon" />
      </div>
      <p class="skills__cta-text">
        {{ texts().skills.ctaText1 }}
        <a href="#contact" class="skills__cta-link">{{ texts().skills.ctaLink }}</a>
        {{ texts().skills.ctaText2 }}
      </p>
    </div>

    <a href="#portfolio" class="skills__arrow">
      <img src="assets/icon/arrow-right1.svg" alt="" class="skills__arrow-1" />
      <img src="assets/icon/arrow-right2.svg" alt="" class="skills__arrow-2" />
      <img src="assets/icon/arrow-right3.svg" alt="" class="skills__arrow-3" />
    </a>
  </div>
</section>
