<!-- ============================================
     MY SKILLS SECTION
     ============================================ -->
<section class="skills" id="skills">


  <div class="skills__container">


    <h2 class="skills__title" [class.green]="isTitleGreen">{{ texts().skills.title }}</h2>



  <div class="skills__grid">
  <!-- Row 1 -->
  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/angular.svg" alt="Angular">
    </div>
    <span>Angular</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/typescript.svg" alt="TypeScript">
    </div>
    <span>TypeScript</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/javascript.svg" alt="JavaScript">
    </div>
    <span>JavaScript</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/html.svg" alt="HTML">
    </div>
    <span>HTML</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/css.svg" alt="CSS">
    </div>
    <span>CSS</span>
  </div>

  <!-- Row 2 -->
  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/firebase.svg" alt="Firebase">
    </div>
    <span>Firebase</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/git.svg" alt="Git">
    </div>
    <span>Git</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/scrum.svg" alt="Scrum">
    </div>
    <span>Scrum</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/restapi.svg" alt="REST-API">
    </div>
    <span>REST-API</span>
  </div>

  <div class="skills__item">
    <div class="skills__item-wrapper">
      <img src="assets/icons/material-design.svg" alt="Material Design">
    </div>
    <span>Material Design</span>
  </div>

</div>

    <!-- Bottom CTA -->
<div class="skills__cta">
  <div class="skills__cta-icon-wrapper">
    <img src="assets/icons/learning.svg" alt="" class="skills__cta-icon">
  </div>
  <p class="skills__cta-text">
  {{ texts().skills.ctaText1 }}
  <a href="#contact" class="skills__cta-link">{{ texts().skills.ctaLink }}</a>
  {{ texts().skills.ctaText2 }}
</p>
</div>



<a href="#portfolio" class="skills__arrow">
  <img src="assets/icons/arrow-right1.svg" alt="" class="skills__arrow-1">
  <img src="assets/icons/arrow-right2.svg" alt="" class="skills__arrow-2">
  <img src="assets/icons/arrow-right3.svg" alt="" class="skills__arrow-3">
</a>

  </div>
</section>
