<!-- ============================================
     CONTACT SECTION
     ============================================ -->
<section class="contact" id="contact">
  
  <!-- Siyah Arka Plan SVG -->
  <div class="contact__background">
    <img src="assets/icons/hintergrund-contact.svg" alt="" class="contact__bg-image">
  </div>

  <div class="container">
    <div class="contact__content">

      <!-- Sol Taraf - Başlık -->
      <div class="contact__header">
        <h2 class="contact__title">{{ contactTitle }}</h2>
      </div>

      <!-- Sağ Taraf - Form -->
      <div class="contact__form-wrapper">
        <h3 class="contact__form-title">Want to discuss a new project?</h3>
        <p class="contact__form-subtitle">Say hello! let's discuss your ideas and make it happen</p>

        <form class="contact__form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
          
          <!-- Name Input -->
          <div class="contact__input-group" [class.error]="nameError" [class.success]="nameSuccess">
            <input 
              type="text" 
              id="name"
              name="name"
              [(ngModel)]="formData.name"
              (focus)="onFocus('name')"
              (blur)="onBlur('name')"
              [class.has-value]="formData.name"
              required
            >
            <label for="name">Your name</label>
            <span class="contact__input-icon contact__input-icon--error" *ngIf="nameError">
              <img src="assets/icons/error.svg" alt="Error">
            </span>
            <span class="contact__input-icon contact__input-icon--success" *ngIf="nameSuccess">
              <img src="assets/icons/done.svg" alt="Success">
            </span>
            <span class="contact__error-message" *ngIf="nameError">Your name is required</span>
          </div>

          <!-- Email Input -->
          <div class="contact__input-group" [class.error]="emailError" [class.success]="emailSuccess">
            <input 
              type="email" 
              id="email"
              name="email"
              [(ngModel)]="formData.email"
              (focus)="onFocus('email')"
              (blur)="onBlur('email')"
              [class.has-value]="formData.email"
              required
            >
            <label for="email">Your email</label>
            <span class="contact__input-icon contact__input-icon--error" *ngIf="emailError">
              <img src="assets/icons/error.svg" alt="Error">
            </span>
            <span class="contact__input-icon contact__input-icon--success" *ngIf="emailSuccess">
              <img src="assets/icons/done.svg" alt="Success">
            </span>
            <span class="contact__error-message" *ngIf="emailError">Your email is required</span>
          </div>

          <!-- Message Textarea -->
          <div class="contact__input-group contact__input-group--textarea" [class.error]="messageError" [class.success]="messageSuccess">
            <textarea 
              id="message"
              name="message"
              [(ngModel)]="formData.message"
              (focus)="onFocus('message')"
              (blur)="onBlur('message')"
              [class.has-value]="formData.message"
              rows="6"
              required
            ></textarea>
            <label for="message">Your message</label>
            <span class="contact__input-icon contact__input-icon--error" *ngIf="messageError">
              <img src="assets/icons/error.svg" alt="Error">
            </span>
            <span class="contact__input-icon contact__input-icon--success" *ngIf="messageSuccess">
              <img src="assets/icons/done.svg" alt="Success">
            </span>
            <span class="contact__error-message" *ngIf="messageError">Your message is required</span>
          </div>
 
          <!-- Privacy Checkbox -->
<div class="contact__checkbox-group" [class.error]="privacyError" [class.checked]="formData.privacy">
  <div class="contact__checkbox" 
    (click)="togglePrivacy()"
    (mouseenter)="onCheckboxHover(true)" 
    (mouseleave)="onCheckboxHover(false)">
    <img *ngIf="!formData.privacy && !privacyHover" src="assets/icons/checkbox-1.svg" alt="">
    <img *ngIf="!formData.privacy && privacyHover" src="assets/icons/checkbox-1-hover.svg" alt="">
    <img *ngIf="formData.privacy && !privacyHover" src="assets/icons/checkbox-3-checked.svg" alt="">
    <img *ngIf="formData.privacy && privacyHover" src="assets/icons/checkbox-checked-hover.svg" alt="">
  </div>
  <label (click)="togglePrivacy()">
    I've read the <a routerLink="/privacy-policy" class="contact__privacy-link" (click)="$event.stopPropagation()">privacy policy</a> and agree to the processing of my data as outlined.
  </label>
  <span class="contact__error-message" *ngIf="privacyError">Please accept the privacy policy</span>
</div>

         <!-- Submit Button -->
        <button type="submit" class="contact__submit-btn"[class.active]="isFormValid">
              {{ submitButtonText }}
        </button>

        </form>
      </div>

    </div>

    <!-- Yukarı Ok -->
    <a href="#hero" class="contact__arrow">
      <img src="assets/icons/pfeile-contact.svg" alt="Back to top" class="contact__arrow-icon">
    </a>

  </div>

</section>
